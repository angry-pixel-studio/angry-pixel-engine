<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Angry Pixel Engine — Shmup Demo</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            body {
                background-color: black;
                overflow: hidden;
            }

            #app {
                margin-left: auto;
                margin-right: auto;
                height: 100vh;
                aspect-ratio: 16/9;
            }

            #app canvas {
                width: 100%;
                height: 100%;
                outline: none;
            }

            @media all and (display-mode: fullscreen) {
                body {
                    cursor: none;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/index.ts"></script>
    </body>
</html>
